appId: com.lightprogramming.piratebaylivetorrent
productName: PirateBay Live Torrent
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - package.json
  - "!**/.vite/**"
  - "!**/{.DS_Store,.git,.idea,.vscode}/**"
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
# Drop a Mac transmission-daemon binary at resources/bin/transmission-daemon
# before running `npm run package:mac` and it will be shipped at
# Contents/Resources/bin/transmission-daemon inside the .app bundle.
extraResources:
  - from: resources/bin
    to: bin
    filter:
      - "**/*"
mac:
  target:
    - dmg
    - zip
  category: public.app-category.entertainment
  hardenedRuntime: false
  gatekeeperAssess: false
  # Ad-hoc sign (`-` means no identity, sign with the local key). On Apple
  # Silicon, totally-unsigned apps get the misleading "damaged" Gatekeeper
  # error; ad-hoc signing converts that into the milder right-click-Open
  # workflow. Real fix is a $99/yr Apple Developer cert + notarization.
  identity: '-'
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
